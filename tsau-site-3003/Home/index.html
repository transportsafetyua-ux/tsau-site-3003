<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>АСБТУ — Контакти</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    html{-webkit-text-size-adjust:100%}
    :root{ --brand:#2d442f; --sand:#f5deb3; --page:#dfe8f2; }
    body{
      font-family:Arial,Helvetica,sans-serif;color:#111827;
      background:var(--page) url("/tsau-site-3003/buses.jpg") no-repeat center top/cover;
      min-height:100vh;
    }
    .topbar{width:100%;background:var(--brand);color:#fff}
    .wrap{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 16px}
    .brand{font-weight:700;font-size:clamp(18px,4.4vw,32px);white-space:nowrap}
    nav{display:flex;gap:12px;flex-wrap:wrap}
    nav a{color:var(--sand);text-decoration:none;font-weight:600;font-size:clamp(12px,3.2vw,14px)}
    nav a:hover{text-decoration:underline}
    .lang{margin-left:auto;display:flex;gap:8px}
    .lang a{color:#fff;text-decoration:none;font-weight:700;padding:6px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.25)}

    .content{
      max-width:900px;margin:18vh auto 6vh;background:rgba(255,255,255,.84);
      padding:24px;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,.12)
    }
    h1{margin:0 0 12px 0;color:var(--brand)}
    p{margin:0 0 10px 0}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="wrap">
      <div class="brand">Асоціація сприяння безпеці на транспорті України</div>
      <nav>
        <a href="../Home/index.html">Головна</a>
        <a href="../About/index.html">Про нас</a>
        <a href="../Programs/index.html">Програми</a>
        <a href="../Publications/index.html">Публікації</a>
        <a href="../Contacts/index.html">Контакти</a>
      </nav>
      <div class="lang"><a href="#">Укр</a><a href="#">EN</a></div>
    </div>
  </div>

  <div class="content">
    <h1>Контакти</h1>
    <p>Email: info@tsau.org.ua</p>
    <p>Адреса: Україна</p>
  </div>
</body>
</html>
